<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 预加载 latin 子集（首屏 ASCII 必用）；latin-ext 由 @font-face 的 unicode-range 按需加载 -->
    <link rel="preload" href="/fonts/outfit-latin.woff2" as="font" type="font/woff2" crossorigin />
    <title>Vivi Resume - 在线简历编辑器</title>
    <style>
      /* ponytail: 内联 app shell — JS 加载前先绘制品牌色背景 + logo，消除白屏（FCP 提前到 HTML 阶段） */
      html, body { background: #252527; }
      #app { min-height: 100vh; }
      #app > .app-shell {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 18px;
        background: #252527;
        color: #f5f5f7;
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
        z-index: 9999;
      }
      #app > .app-shell__logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 600; }
      #app > .app-shell__logo img { width: 28px; height: 28px; }
      #app > .app-shell__spinner {
        width: 22px; height: 22px; border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.15); border-top-color: #4f6df5;
        animation: app-shell-spin 0.7s linear infinite;
      }
      @keyframes app-shell-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- ponytail: 静态 app shell，Vue 挂载后自动替换 -->
      <div class="app-shell">
        <div class="app-shell__logo">
          <img src="/favicon.ico" alt="" />
          <span>Vivi Resume</span>
        </div>
        <div class="app-shell__spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
